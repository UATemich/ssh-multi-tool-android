name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install system deps
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk \
        autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
        libncursesw5-dev cmake libffi-dev libssl-dev python3-pip

    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    - name: Setup Android SDK (FIX AIDL + licenses)
      run: |
        mkdir -p $HOME/android-sdk
        export ANDROIDSDK=$HOME/android-sdk
        export PATH=$PATH:$ANDROIDSDK/cmdline-tools/latest/bin

        yes | sdkmanager --licenses || true

        sdkmanager \
          "platform-tools" \
          "platforms;android-33" \
          "build-tools;33.0.2" || true

    - name: Build APK
      run: |
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
